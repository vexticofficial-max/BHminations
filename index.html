<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHminations - Animasyon Platformu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    
    <header id="header">
        <div class="header-left">
            <div class="menu-icon">☰</div>
            <div class="logo">BHminations</div>
        </div>
        
        <div class="header-middle">
            <div class="search-container">
                <input type="text" placeholder="Animasyon ara..." class="search-bar">
                <button class="search-btn">🔍</button>
            </div>
        </div>

        <div class="header-right">
            <button id="theme-toggle" class="icon-btn">🌙</button>
            <div class="user-info">
                <img src="avatar.png" class="user-avatar" alt="Alper">
                <span class="verified-badge">✔</span>
            </div>
        </div>
    </header>

    <div class="container">
        <nav class="sidebar">
            <ul>
                <li class="active">🏠 <span>Anasayfa</span></li>
                <li>🎞️ <span>Videolarım</span></li>
                <li>🔥 <span>Trendler</span></li>
                <hr>
                <li>⚙️ <span>Ayarlar</span></li>
            </ul>
        </nav>

        <main class="content">
            <section class="upload-section">
                <input type="text" id="video-title" placeholder="Video Başlığı">
                <input type="file" id="video-file" accept="video/*">
                <button onclick="handleUpload()" class="upload-btn">Yükle</button>
            </section>

            <h2 id="main-title">Önerilen Animasyonlar</h2>
            <div class="video-grid" id="video-grid"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
