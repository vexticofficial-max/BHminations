<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHminations - Kurucu Paneli</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        /* TASARIM (GUI) AYARLARI */
        :root {
            --bg: #f9f9f9; --txt: #0f0f0f; --header: #ffffff;
            --sidebar: #ffffff; --border: #e5e5e5; --blue: #065fd4;
        }

        .dark-mode {
            --bg: #0f0f0f; --txt: #ffffff; --header: #0f0f0f;
            --sidebar: #0f0f0f; --border: #3f3f3f; --blue: #3ea6ff;
        }

        body {
            margin: 0; font-family: 'Roboto', sans-serif;
            background-color: var(--bg); color: var(--txt); transition: 0.2s;
        }

        /* Üst Menü */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 16px; background: var(--header);
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
        }

        .logo { font-size: 20px; font-weight: bold; color: #ff0000; cursor: pointer; }

        /* Ana Düzen */
        .layout { display: flex; }

        .sidebar {
            width: 240px; height: 100vh; padding: 12px;
            background: var(--sidebar); border-right: 1px solid var(--border);
        }

        .sidebar li {
            list-style: none; padding: 10px; border-radius: 8px;
            cursor: pointer; margin-bottom: 4px;
        }

        .sidebar li:hover { background: rgba(0,0,0,0.05); }
        .dark-mode .sidebar li:hover { background: rgba(255,255,255,0.1); }

        .content { flex: 1; padding: 24px; }

        /* Admin Paneli Kutusu */
        .admin-box {
            background: var(--header); border: 2px solid var(--blue);
            padding: 20px; border-radius: 12px; margin-bottom: 24px;
        }

        input {
            width: 100%; padding: 10px; margin: 8px 0;
            border: 1px solid var(--border); border-radius: 4px;
            background: var(--bg); color: var(--txt); box-sizing: border-box;
        }

        .btn-main {
            background: var(--blue); color: white; border: none;
            padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;
        }

        .video-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;
        }

        .v-card { background: var(--header); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        .verified { color: #3ea6ff; margin-left: 4px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">BHminations</div>
        <div style="display: flex; gap: 12px; align-items: center;">
            <button onclick="toggleTheme()" id="theme-icon" style="background:none; border:none; font-size:20px; cursor:pointer;">🌙</button>
            <button id="login-btn" onclick="googleLogin()" style="background:var(--blue); color:white; border:none; padding:8px 16px; border-radius:18px; cursor:pointer;">Oturum aç</button>
            <div id="user-info" style="display:none; align-items:center; gap:8px;">
                <img id="u-img" style="width:32px; height:32px; border-radius:50%;">
                <span id="u-name" style="font-weight: 500;"></span>
            </div>
        </div>
    </header>

    <div class="layout">
        <nav class="sidebar">
            <li style="background: rgba(0,0,0,0.05);">🏠 Anasayfa</li>
            <li>🔥 Trendler</li>
            <div id="admin-only" style="display:none; border-top: 1px solid var(--border); margin-top: 15px; padding-top: 10px;">
                <li onclick="toggleAdmin()" style="color: var(--blue); font-weight: bold;">🛠️ Kurucu Paneli</li>
            </div>
        </nav>

        <main class="content">
            <div id="admin-panel" class="admin-box" style="display:none;">
                <h3 style="margin-top:0;">🎥 Yeni Animasyon Ekle</h3>
                <input type="text" id="v-title" placeholder="Video Başlığı">
                <input type="text" id="v-url" placeholder="YouTube Linki">
                <label><input type="checkbox" id="v-tick"> Mavi Tikli</label><br><br>
                <button onclick="addVideo()" class="btn-main">SİSTEME YÜKLE</button>
            </div>

            <h2>Önerilen Videolar</h2>
            <div id="video-grid" class="video-grid"></div>
        </main>
    </div>

    <script>
        // FIREBASE BAĞLANTISI
        const firebaseConfig = {
            apiKey: "AIzaSyAaDFdyia63SMjnBreMRUQbCPs4foUHFl8",
            authDomain: "bhminations.firebaseapp.com",
            projectId: "bhminations",
            storageBucket: "bhminations.firebasestorage.app",
            messagingSenderId: "606037209431",
            appId: "1:606037209431:web:a1968ebb1673475deb8e12"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // TEMA DEĞİŞTİRİCİ
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
        }

        // GİRİŞ SİSTEMİ
        function googleLogin() {
            auth.signInWithPopup(provider).catch(e => alert(e.message));
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('user-info').style.display = 'flex';
                document.getElementById('u-img').src = user.photoURL;
                document.getElementById('u-name').innerText = user.displayName;

                // KURUCU KONTROLÜ (bluehairkomsi@gmail.com)
                if (user.email === "bluehairkomsi@gmail.com") {
                    document.getElementById('admin-only').style.display = 'block';
                }
            }
        });

        function toggleAdmin() {
            const p = document.getElementById('admin-panel');
            p.style.display = p.style.display === 'none' ? 'block' : 'none';
        }

        // VİDEO EKLEME
        function addVideo() {
            const t = document.getElementById('v-title').value;
            const u = document.getElementById('v-url').value;
            const check = document.getElementById('v-tick').checked;

            if(!t || !u) return alert("Alper, tüm alanları doldur!");

            let id = u.split('v=')[1] || u.split('/').pop();
            if(id.includes('&')) id = id.split('&')[0];

            const card = document.createElement('div');
            card.className = 'v-card';
            card.innerHTML = `
                <iframe width="100%" height="180" src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe>
                <div style="padding:12px;">
                    <h4 style="margin:0;">${t} ${check ? '<span class="verified">✔</span>' : ''}</h4>
                    <p style="font-size:12px; color:gray; margin:5px 0;">Yükleyen: ${auth.currentUser.displayName}</p>
                </div>
            `;
            document.getElementById('video-grid').prepend(card);
            alert("Video eklendi! 🚀");
        }
    </script>
</body>
</html>
