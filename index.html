<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHminations - Animasyon Platformu</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        /* PROFESYONEL GUI AYARLARI */
        :root {
            --bg: #f9f9f9; --txt: #0f0f0f; --card: #ffffff;
            --border: #e5e5e5; --blue: #065fd4; --red: #ff0000;
        }

        .dark-mode {
            --bg: #0f0f0f; --txt: #ffffff; --card: #1e1e1e;
            --border: #3f3f3f; --blue: #3ea6ff;
        }

        body {
            margin: 0; font-family: 'Roboto', sans-serif;
            background-color: var(--bg); color: var(--txt); transition: 0.3s;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 16px; background: var(--card);
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-size: 20px; font-weight: bold; color: var(--red); cursor: pointer; }

        .layout { display: flex; }

        .sidebar {
            width: 240px; height: 100vh; padding: 12px;
            background: var(--card); border-right: 1px solid var(--border);
        }

        .sidebar li {
            list-style: none; padding: 12px; border-radius: 10px;
            cursor: pointer; margin-bottom: 5px; display: flex; align-items: center; gap: 15px;
        }

        .sidebar li:hover { background: rgba(0,0,0,0.05); }
        .dark-mode .sidebar li:hover { background: rgba(255,255,255,0.1); }

        .content { flex: 1; padding: 24px; }

        .video-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;
        }

        /* YÜKLEME VE YÖNETİM ALANI */
        .box {
            background: var(--card); border: 1px solid var(--border);
            padding: 20px; border-radius: 12px; margin-bottom: 25px;
        }

        input {
            width: 100%; padding: 12px; margin: 10px 0;
            border: 1px solid var(--border); border-radius: 6px;
            background: var(--bg); color: var(--txt); box-sizing: border-box;
        }

        .btn {
            background: var(--blue); color: white; border: none;
            padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%;
        }

        .v-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        .verified-badge { color: var(--blue); margin-left: 5px; font-weight: bold; }
    </style>
</head>
<body class="light-mode">

    <header>
        <div class="logo">BHminations</div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <button onclick="toggleTheme()" style="background:none; border:none; font-size:20px; cursor:pointer;">🌙</button>
            <button id="login-btn" onclick="googleLogin()" style="background:var(--blue); color:white; border:none; padding:8px 16px; border-radius:20px; cursor:pointer;">Oturum aç</button>
            <div id="user-info" style="display:none; align-items:center; gap: 10px;">
                <img id="u-img" style="width:32px; height:32px; border-radius:50%;">
                <span id="u-name" style="font-weight: 500;"></span>
                <span id="u-verified" class="verified-badge" style="display:none;">✔</span>
            </div>
        </div>
    </header>

    <div class="layout">
        <nav class="sidebar">
            <li class="active">🏠 Anasayfa</li>
            <li>🔥 Trendler</li>
            <div id="admin-menu" style="display:none; border-top: 1px solid var(--border); margin-top: 15px; padding-top: 10px;">
                <li onclick="togglePanel('admin-panel')" style="color: var(--blue); font-weight: bold;">🛠️ Kurucu Paneli</li>
            </div>
        </nav>

        <main class="content">
            <div id="upload-box" class="box" style="display:none;">
                <h3 style="margin-top:0;">🎥 Animasyon Paylaş</h3>
                <input type="text" id="v-title" placeholder="Başlık Yaz...">
                <input type="text" id="v-url" placeholder="YouTube Video Linki...">
                <button onclick="publishVideo()" class="btn">HERKESE YAYINLA</button>
            </div>

            <div id="admin-panel" class="box" style="display:none; border: 2px solid var(--blue);">
                <h3 style="margin-top:0;">🛡️ Kurucu Yönetim Merkezi</h3>
                <p style="font-size: 13px; color: gray;">Buradan ihtar atabilir, banlayabilir veya onay verebilirsin.</p>
                <input type="text" id="target-mail" placeholder="Kullanıcı E-postası...">
                <div style="display: flex; gap: 10px;">
                    <button onclick="adminAction('verify')" style="flex:1; background:#2ba640;" class="btn">Onayla (Mavi Tik)</button>
                    <button onclick="adminAction('ban')" style="flex:1; background:#cc0000;" class="btn">İhtar At / Banla</button>
                </div>
            </div>

            <h2>Önerilen Videolar</h2>
            <div id="video-grid" class="video-grid">
                </div>
        </main>
    </div>

    <script>
        // FIREBASE KURULUMU
        const firebaseConfig = {
            apiKey: "AIzaSyAaDFdyia63SMjnBreMRUQbCPs4foUHFl8",
            authDomain: "bhminations.firebaseapp.com",
            projectId: "bhminations",
            storageBucket: "bhminations.firebasestorage.app",
            messagingSenderId: "606037209431",
            appId: "1:606037209431:web:a1968ebb1673475deb8e12"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const provider = new firebase.auth.GoogleAuthProvider();

        // TEMA FONKSİYONU
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
        }

        // GİRİŞ İŞLEMİ
        function googleLogin() {
            auth.signInWithPopup(provider).catch(e => alert(e.message));
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('user-info').style.display = 'flex';
                document.getElementById('upload-box').style.display = 'block';
                document.getElementById('u-img').src = user.photoURL;
                document.getElementById('u-name').innerText = user.displayName;

                // ALPER KONTROLÜ
                if (user.email === "bluehairkomsi@gmail.com") {
                    document.getElementById('admin-menu').style.display = 'block';
                    document.getElementById('u-verified').style.display = 'inline';
                }
                loadVideos();
            }
        });

        // VİDEO YAYINLAMA
        async function publishVideo() {
            const t = document.getElementById('v-title').value;
            const u = document.getElementById('v-url').value;
            if(!t || !u) return alert("Alanları doldur Alper!");

            let id = u.split('v=')[1] || u.split('/').pop();
            if(id.includes('&')) id = id.split('&')[0];

            await db.collection("videos").add({
                title: t, videoId: id, 
                author: auth.currentUser.displayName,
                authorEmail: auth.currentUser.email,
                isVerified: (auth.currentUser.email === "bluehairkomsi@gmail.com"),
                time: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Video yüklendi! 🚀");
            location.reload();
        }

        // VİDEOLARI ÇEKME
        function loadVideos() {
            const grid = document.getElementById('video-grid');
            db.collection("videos").orderBy("time", "desc").onSnapshot(snap => {
                grid.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    const card = document.createElement('div');
                    card.className = 'v-card';
                    card.innerHTML = `
                        <iframe width="100%" height="180" src="https://www.youtube.com/embed/${d.videoId}" frameborder="0" allowfullscreen></iframe>
                        <div style="padding:12px;">
                            <h4 style="margin:0;">${d.title} ${d.isVerified ? '<span class="verified-badge">✔</span>' : ''}</h4>
                            <p style="font-size:12px; color:gray; margin-top:5px;">${d.author}</p>
                            ${auth.currentUser.email === "bluehairkomsi@gmail.com" ? `<button onclick="deleteV('${doc.id}')" style="color:red; background:none; border:none; cursor:pointer; font-size:11px; padding:0;">VİDEOYU SİL</button>` : ''}
                        </div>
                    `;
                    grid.appendChild(card);
                });
            });
        }

        function deleteV(id) { if(confirm("Silinsin mi?")) db.collection("videos").doc(id).delete(); }
        function togglePanel(id) { const p = document.getElementById(id); p.style.display = p.style.display === 'none' ? 'block' : 'none'; }
    </script>
</body>
</html>
