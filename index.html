<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHminations - Animasyon Platformu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode"> <header id="header">
        <div class="header-left">
            <div class="menu-icon">☰</div>
            <div class="logo">BHminations</div>
        </div>
        
        <div class="header-middle">
            <input type="text" placeholder="Animasyon ara..." class="search-bar">
            <button class="search-btn">🔍</button>
        </div>

        <div class="header-right">
            <button id="theme-toggle">🌙 Mod Değiştir</button>
            <div class="user-info">
                <span class="username">Alper</span>
                <span class="verified-badge">✔</span>
            </div>
        </div>
    </header>

    <div class="container">
        <nav class="sidebar">
            <ul>
                <li class="active">🏠 Anasayfa</li>
                <li>🎞️ Videolarım</li>
                <li>🔥 Trendler</li>
                <li>⚙️ Ayarlar (Moderatör)</li>
            </ul>
        </nav>

        <main class="content">
            <h2>Önerilen Animasyonlar</h2>
            <div class="video-grid" id="video-grid">
                <div class="video-card">
                    <div class="thumbnail"></div>
                    <div class="video-info">
                        <img src="avatar.png" class="channel-img">
                        <div class="text">
                            <h4>Roblox Garou Combo Animation</h4>
                            <p>BHminations <span class="verified-badge">✔</span></p>
                            <p>150K İzlenme • 2 saat önce</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
